[tool:pytest]
norecursedirs = node_modules
log_cli_level = WARNING
junit_family = xunit2
filterwarnings=
	ignore:Using or importing the ABCs
    ignore:.*formatargspec.*:DeprecationWarning
    ignore:.*isAlive.*:PendingDeprecationWarning
    ignore:datetime.datetime.utcnow:DeprecationWarning
    ignore:datetime.datetime.utcfromtimestamp:DeprecationWarning
    ignore:ast.Str is deprecated:DeprecationWarning
    ignore:Attribute s is deprecated:DeprecationWarning
    ignore:Constant.__init__ got an unexpected:DeprecationWarning
    ignore:Constant.__init__ missing:DeprecationWarning
    ignore:Call to '__init__' function with deprecated usage of input argument/s:DeprecationWarning
